<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Neon Copter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      touch-action: none;
      overflow: hidden;
      user-select: none;
    }
    h1 {
      font-size: clamp(1rem, 5vw, 1.8rem);
      color: #ff00ff;
      letter-spacing: 4px;
      text-shadow: 0 0 12px #ff00ff;
      margin-bottom: 6px;
    }
    #hud {
      font-size: clamp(0.7rem, 3vw, 0.95rem);
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    #hud span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #ff00ff;
      box-shadow: 0 0 24px #ff00ffaa;
      background: #050510;
      max-width: 100vw;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    #overlayTitle {
      font-size: clamp(1.2rem, 6vw, 2rem);
      color: #ff00ff;
      text-shadow: 0 0 16px #ff00ff;
      letter-spacing: 4px;
    }
    #overlayMsg {
      font-size: clamp(0.7rem, 3vw, 1rem);
      color: #00ffe7;
      letter-spacing: 2px;
    }
    #overlayScore {
      font-size: clamp(0.8rem, 3.5vw, 1.1rem);
      color: #ffe600;
      letter-spacing: 2px;
    }
    #startBtn {
      pointer-events: all;
      padding: 12px 36px;
      background: transparent;
      border: 2px solid #ff00ff;
      color: #ff00ff;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.8rem, 3vw, 1rem);
      cursor: pointer;
      letter-spacing: 3px;
      text-shadow: 0 0 8px #ff00ff;
      box-shadow: 0 0 14px #ff00ff66;
      -webkit-tap-highlight-color: transparent;
    }
    #startBtn:hover, #startBtn:active { background: #ff00ff22; }
  </style>
</head>
<body>
  <h1>NEON COPTER</h1>
  <div id="hud">SCORE: <span id="scoreVal">0</span> &nbsp;|&nbsp; BEST: <span id="bestVal">0</span></div>
  <div style="position:relative; display:inline-block;">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div id="overlayTitle">NEON COPTER</div>
      <div id="overlayMsg">HOLD / TAP TO FLY</div>
      <div id="overlayScore"></div>
      <button id="startBtn">START</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    function getSize() {
      const W = Math.min(window.innerWidth - 8, 420);
      const H = Math.min(window.innerHeight - 140, 560);
      return { W: Math.floor(W), H: Math.floor(H) };
    }

    let { W, H } = getSize();
    canvas.width = W;
    canvas.height = H;
    overlay.style.width = W + 'px';
    overlay.style.height = H + 'px';

    // --- Game constants (relative to size) ---
    const GRAVITY = () => 0.38 * (H / 560);
    const THRUST = () => -0.55 * (H / 560);
    const PIPE_W = () => Math.floor(52 * (W / 420));
    const GAP = () => Math.floor(148 * (H / 560));
    const PIPE_SPEED = () => 2.4 * (W / 420);
    const BIRD_X = () => Math.floor(W * 0.22);
    const BIRD_R = () => Math.floor(14 * (W / 420));
    const PIPE_INTERVAL = () => Math.floor(W * 1.05);

    let bird, pipes, score, best, frameId, state, thrust, particles;
    // state: 'idle' | 'playing' | 'dead'

    function init() {
      bird = { x: BIRD_X(), y: H / 2, vy: 0, angle: 0 };
      pipes = [];
      particles = [];
      score = 0;
      thrust = false;
      state = 'idle';
      document.getElementById('scoreVal').textContent = 0;
      overlay.style.display = 'flex';
      document.getElementById('overlayTitle').textContent = 'NEON COPTER';
      document.getElementById('overlayMsg').textContent = 'HOLD / TAP TO FLY';
      document.getElementById('overlayScore').textContent = '';
      startBtn.textContent = 'START';
      if (!best) best = parseInt(localStorage.getItem('ncBest') || '0');
      document.getElementById('bestVal').textContent = best;
    }

    function startGame() {
      overlay.style.display = 'none';
      state = 'playing';
      bird = { x: BIRD_X(), y: H / 2, vy: 0, angle: 0 };
      pipes = [];
      particles = [];
      score = 0;
      document.getElementById('scoreVal').textContent = 0;
      // Spawn first pipe after a delay
      pipes.push(makePipe(W + 80));
    }

    function makePipe(x) {
      const minTop = Math.floor(H * 0.12);
      const maxTop = Math.floor(H - GAP() - H * 0.12);
      const topH = minTop + Math.floor(Math.random() * (maxTop - minTop));
      return { x, topH, scored: false };
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x, y,
          dx: Math.cos(angle) * speed,
          dy: Math.sin(angle) * speed,
          life: 1,
          color
        });
      }
    }

    function update() {
      if (state !== 'playing') return;

      // Bird physics
      if (thrust) bird.vy += THRUST();
      bird.vy += GRAVITY();
      bird.vy = Math.max(-9 * (H/560), Math.min(bird.vy, 10 * (H/560)));
      bird.y += bird.vy;
      bird.angle = Math.max(-30, Math.min(bird.vy * 4, 70));

      // Ceiling & floor
      if (bird.y - BIRD_R() < 0 || bird.y + BIRD_R() > H) {
        die();
        return;
      }

      // Pipes
      const pw = PIPE_W(), gap = GAP(), spd = PIPE_SPEED();
      for (let p of pipes) p.x -= spd;

      // Remove off-screen
      pipes = pipes.filter(p => p.x + pw > -10);

      // Spawn new
      const last = pipes[pipes.length - 1];
      if (!last || last.x < W - PIPE_INTERVAL()) {
        pipes.push(makePipe(W + pw));
      }

      // Score & collision
      const bx = bird.x, by = bird.y, br = BIRD_R() * 0.82;
      for (let p of pipes) {
        const inX = bx + br > p.x && bx - br < p.x + pw;
        if (inX) {
          if (by - br < p.topH || by + br > p.topH + gap) {
            die();
            return;
          }
        }
        if (!p.scored && p.x + pw < bx) {
          p.scored = true;
          score++;
          document.getElementById('scoreVal').textContent = score;
          spawnParticles(bx, by, '#ffe600');
        }
      }

      // Particles
      for (let p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.1;
        p.life -= 0.04;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function die() {
      state = 'dead';
      spawnParticles(bird.x, bird.y, '#ff4444');
      spawnParticles(bird.x, bird.y, '#ff00ff');
      if (score > best) {
        best = score;
        localStorage.setItem('ncBest', best);
        document.getElementById('bestVal').textContent = best;
      }
      setTimeout(() => {
        overlay.style.display = 'flex';
        document.getElementById('overlayTitle').textContent = '💀 CRASHED';
        document.getElementById('overlayMsg').textContent = `SCORE: ${score}`;
        document.getElementById('overlayScore').textContent = score >= best ? '🏆 NEW BEST!' : `BEST: ${best}`;
        startBtn.textContent = 'TRY AGAIN';
      }, 600);
    }

    function drawBird() {
      const x = bird.x, y = bird.y, r = BIRD_R();
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(bird.angle * Math.PI / 180);

      // Body glow
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 18;

      // Helicopter body
      ctx.fillStyle = '#cc00cc';
      ctx.beginPath();
      ctx.ellipse(0, 2, r * 1.1, r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cockpit window
      ctx.fillStyle = '#00ffe7';
      ctx.shadowColor = '#00ffe7';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(-r * 0.15, 0, r * 0.42, r * 0.35, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Tail boom
      ctx.fillStyle = '#990099';
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.moveTo(r * 0.8, 0);
      ctx.lineTo(r * 1.6, -r * 0.1);
      ctx.lineTo(r * 1.6, r * 0.5);
      ctx.lineTo(r * 0.8, r * 0.4);
      ctx.closePath();
      ctx.fill();

      // Tail rotor
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 8;
      const t = Date.now() / 80;
      for (let i = 0; i < 2; i++) {
        const a = t + i * Math.PI;
        ctx.beginPath();
        ctx.moveTo(r * 1.6, r * 0.2 - r * 0.28 * Math.cos(a));
        ctx.lineTo(r * 1.6, r * 0.2 + r * 0.28 * Math.cos(a));
        ctx.stroke();
      }

      // Main rotor
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 10;
      const t2 = Date.now() / 60;
      for (let i = 0; i < 2; i++) {
        const a = t2 + i * Math.PI;
        ctx.beginPath();
        ctx.moveTo(-r * 1.1 * Math.cos(a), -r * 0.75 - r * 0.1 * Math.sin(a));
        ctx.lineTo( r * 1.1 * Math.cos(a), -r * 0.75 + r * 0.1 * Math.sin(a));
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPipes(p) {
      const pw = PIPE_W(), gap = GAP();

      // Top pipe
      const topGrad = ctx.createLinearGradient(p.x, 0, p.x + pw, 0);
      topGrad.addColorStop(0, '#004d33');
      topGrad.addColorStop(0.5, '#00ff88');
      topGrad.addColorStop(1, '#004d33');
      ctx.fillStyle = topGrad;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 10;
      ctx.fillRect(p.x, 0, pw, p.topH);

      // Top cap
      ctx.fillRect(p.x - 4, p.topH - 14, pw + 8, 14);

      // Bottom pipe
      const botY = p.topH + gap;
      const botGrad = ctx.createLinearGradient(p.x, 0, p.x + pw, 0);
      botGrad.addColorStop(0, '#004d33');
      botGrad.addColorStop(0.5, '#00ff88');
      botGrad.addColorStop(1, '#004d33');
      ctx.fillStyle = botGrad;
      ctx.fillRect(p.x, botY, pw, H - botY);

      // Bottom cap
      ctx.fillRect(p.x - 4, botY, pw + 8, 14);
      ctx.shadowBlur = 0;
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function drawBackground() {
      // Subtle starfield
      ctx.fillStyle = '#ffffff';
      // Use score as a seed offset for parallax
      const stars = 40;
      for (let i = 0; i < stars; i++) {
        const sx = ((i * 137 + score * 0.3) % W);
        const sy = (i * 97) % H;
        const sr = (i % 3 === 0) ? 1.2 : 0.6;
        ctx.globalAlpha = 0.25 + (i % 5) * 0.08;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();

      for (let p of pipes) drawPipes(p);

      drawParticles();
      drawBird();

      // Score overlay while playing
      if (state === 'playing') {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.font = `bold ${Math.floor(H * 0.12)}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillText(score, W / 2, H * 0.18);
        ctx.textAlign = 'left';
      }
    }

    function gameLoop() {
      update();
      draw();
      frameId = requestAnimationFrame(gameLoop);
    }

    // --- Input ---
    function pressStart() { thrust = true; }
    function pressEnd() { thrust = false; }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        thrust = true;
      }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') thrust = false;
    });

    canvas.addEventListener('mousedown', pressStart);
    canvas.addEventListener('mouseup', pressEnd);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); pressStart(); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); pressEnd(); }, { passive: false });

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });

    window.addEventListener('resize', () => {
      const s = getSize();
      W = s.W; H = s.H;
      canvas.width = W;
      canvas.height = H;
      overlay.style.width = W + 'px';
      overlay.style.height = H + 'px';
      if (state === 'playing') die();
    });

    init();
    gameLoop();
  </script>
</body>
</html>
