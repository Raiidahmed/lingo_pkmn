<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brick Breaker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #00ffe7;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ffe7;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 1rem;
      color: #aaa;
    }
    #hud span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #00ffe7;
      box-shadow: 0 0 20px #00ffe7aa;
      background: #050510;
    }
    #message {
      margin-top: 14px;
      font-size: 1rem;
      color: #00ffe7;
      height: 24px;
      letter-spacing: 2px;
    }
    #restartBtn {
      display: none;
      margin-top: 12px;
      padding: 10px 28px;
      background: transparent;
      border: 2px solid #00ffe7;
      color: #00ffe7;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00ffe7;
      box-shadow: 0 0 10px #00ffe755;
      transition: background 0.2s;
    }
    #restartBtn:hover { background: #00ffe722; }
  </style>
</head>
<body>
  <h1>BRICK BREAKER</h1>
  <div id="hud">
    SCORE: <span id="scoreVal">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    LIVES: <span id="livesVal">3</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    LEVEL: <span id="levelVal">1</span>
  </div>
  <canvas id="c" width="480" height="500"></canvas>
  <div id="message">PRESS SPACE OR CLICK TO LAUNCH</div>
  <button id="restartBtn" onclick="init()">PLAY AGAIN</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const PADDLE_W = 80, PADDLE_H = 12, PADDLE_Y = H - 40;
    const BALL_R = 8;
    const BRICK_COLS = 10, BRICK_ROWS = 5;
    const BRICK_W = W / BRICK_COLS;
    const BRICK_H = 22;
    const BRICK_PAD = 3;
    const BRICK_TOP = 50;

    const COLORS = ['#ff4d6d','#ff9a00','#ffe600','#a8ff3e','#00ffe7','#7b61ff'];

    let paddle, ball, bricks, score, lives, level, launched, animId, gameOver, won;

    function init() {
      paddle = { x: W/2 - PADDLE_W/2, y: PADDLE_Y, w: PADDLE_W };
      ball = { x: W/2, y: PADDLE_Y - BALL_R - 2, dx: 0, dy: 0, speed: 4 };
      score = 0; lives = 3; level = 1;
      launched = false; gameOver = false; won = false;
      makeBricks();
      document.getElementById('restartBtn').style.display = 'none';
      document.getElementById('message').textContent = 'PRESS SPACE OR CLICK TO LAUNCH';
      updateHUD();
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    function makeBricks() {
      bricks = [];
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: c * BRICK_W + BRICK_PAD/2,
            y: BRICK_TOP + r * BRICK_H + BRICK_PAD/2,
            w: BRICK_W - BRICK_PAD,
            h: BRICK_H - BRICK_PAD,
            color: COLORS[r % COLORS.length],
            alive: true
          });
        }
      }
    }

    function launch() {
      if (launched || gameOver || won) return;
      launched = true;
      const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
      ball.dx = Math.cos(angle) * ball.speed;
      ball.dy = Math.sin(angle) * ball.speed;
      document.getElementById('message').textContent = '';
    }

    function updateHUD() {
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('livesVal').textContent = lives;
      document.getElementById('levelVal').textContent = level;
    }

    function loop() {
      update();
      draw();
      if (!gameOver && !won) animId = requestAnimationFrame(loop);
    }

    function update() {
      if (!launched) {
        ball.x = paddle.x + paddle.w / 2;
        return;
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall bounces
      if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.dx *= -1; }
      if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.dx *= -1; }
      if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.dy *= -1; }

      // Paddle collision
      if (
        ball.dy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + PADDLE_H &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w
      ) {
        ball.dy *= -1;
        // Angle based on hit position
        let hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.dx = hit * ball.speed * 1.2;
        ball.dy = -Math.sqrt(ball.speed * ball.speed - ball.dx * ball.dx) || -ball.speed;
        ball.y = paddle.y - BALL_R - 1;
      }

      // Fell below
      if (ball.y - BALL_R > H) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          endGame(false);
        } else {
          launched = false;
          ball.x = paddle.x + paddle.w/2;
          ball.y = PADDLE_Y - BALL_R - 2;
          ball.dx = 0; ball.dy = 0;
          document.getElementById('message').textContent = 'PRESS SPACE OR CLICK TO LAUNCH';
        }
        return;
      }

      // Brick collisions
      for (let b of bricks) {
        if (!b.alive) continue;
        if (
          ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h
        ) {
          b.alive = false;
          score += 10 * level;
          updateHUD();

          // Determine bounce direction
          const overlapL = ball.x + BALL_R - b.x;
          const overlapR = b.x + b.w - (ball.x - BALL_R);
          const overlapT = ball.y + BALL_R - b.y;
          const overlapB = b.y + b.h - (ball.y - BALL_R);
          const minH = Math.min(overlapL, overlapR);
          const minV = Math.min(overlapT, overlapB);
          if (minH < minV) ball.dx *= -1;
          else ball.dy *= -1;

          break;
        }
      }

      // Check win
      if (bricks.every(b => !b.alive)) {
        level++;
        if (level > 3) {
          endGame(true);
        } else {
          ball.speed += 0.5;
          makeBricks();
          launched = false;
          ball.x = paddle.x + paddle.w/2;
          ball.y = PADDLE_Y - BALL_R - 2;
          ball.dx = 0; ball.dy = 0;
          document.getElementById('message').textContent = `LEVEL ${level} — LAUNCH!`;
          updateHUD();
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Bricks
      for (let b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 6;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.shadowBlur = 0;
      }

      // Paddle
      ctx.fillStyle = '#00ffe7';
      ctx.shadowColor = '#00ffe7';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, PADDLE_H, 6);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function endGame(victory) {
      gameOver = !victory;
      won = victory;
      const msg = document.getElementById('message');
      msg.textContent = victory ? `🏆 YOU WIN! SCORE: ${score}` : `💀 GAME OVER! SCORE: ${score}`;
      document.getElementById('restartBtn').style.display = 'inline-block';
    }

    // Controls
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'ArrowUp') launch();
      if (e.key === 'ArrowLeft') paddle.x = Math.max(0, paddle.x - 20);
      if (e.key === 'ArrowRight') paddle.x = Math.min(W - paddle.w, paddle.x + 20);
    });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.w / 2;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    });

    canvas.addEventListener('click', launch);

    // Smooth arrow key movement
    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);
    setInterval(() => {
      if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 6);
      if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 6);
    }, 16);

    init();
  </script>
</body>
</html>
