<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>GBA Emulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Upload screen ── */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 24px;
      text-align: center;
    }

    #upload-screen h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }

    #upload-screen p {
      font-size: 0.9rem;
      color: #888;
      max-width: 320px;
      line-height: 1.5;
    }

    #file-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: clamp(240px, 80vw, 340px);
      height: 160px;
      border: 2px dashed #444;
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
      font-size: 0.85rem;
    }

    #file-label:hover, #file-label.drag-over {
      border-color: #6c8fff;
      background: #1a1f30;
      color: #aabbff;
    }

    #file-label svg {
      width: 40px; height: 40px;
      opacity: 0.5;
    }

    #file-label.drag-over svg { opacity: 0.9; }

    #rom-input { display: none; }

    #file-name {
      font-size: 0.8rem;
      color: #555;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #launch-btn {
      display: none;
      padding: 14px 40px;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #launch-btn:hover { background: #3a5fee; }
    #launch-btn:active { transform: scale(0.97); }

    /* ── Emulator screen ── */
    #emu-screen {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      border: 1px solid #333;
      color: #ccc;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    #back-btn:hover { background: rgba(0,0,0,0.85); }
  </style>
</head>
<body>

  <!-- Upload Screen -->
  <div id="upload-screen">
    <h1>GBA Emulator</h1>
    <p>Load a Game Boy Advance ROM (.gba) to play. Your file stays on your device — nothing is uploaded.</p>

    <label id="file-label" for="rom-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
        <polyline points="8 12 12 8 16 12"/>
        <line x1="12" y1="8" x2="12" y2="20"/>
      </svg>
      Tap to select a .gba file
      <span style="font-size:0.75rem;color:#555">or drag and drop</span>
    </label>

    <input type="file" id="rom-input" accept=".gba,.GBA,.zip,.ZIP"/>
    <div id="file-name"></div>
    <button id="launch-btn">▶ Launch Game</button>
  </div>

  <!-- Emulator Screen -->
  <div id="emu-screen">
    <button id="back-btn">← Back</button>
    <div id="game"></div>
  </div>

  <script>
    const romInput   = document.getElementById('rom-input');
    const fileLabel  = document.getElementById('file-label');
    const fileName   = document.getElementById('file-name');
    const launchBtn  = document.getElementById('launch-btn');
    const uploadScr  = document.getElementById('upload-screen');
    const emuScr     = document.getElementById('emu-screen');
    const backBtn    = document.getElementById('back-btn');

    let romObjectURL = null;
    let romName      = '';

    // File selected via input
    romInput.addEventListener('change', () => {
      const file = romInput.files[0];
      if (file) handleFile(file);
    });

    // Drag & drop
    fileLabel.addEventListener('dragover', e => { e.preventDefault(); fileLabel.classList.add('drag-over'); });
    fileLabel.addEventListener('dragleave', () => fileLabel.classList.remove('drag-over'));
    fileLabel.addEventListener('drop', e => {
      e.preventDefault();
      fileLabel.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      if (romObjectURL) URL.revokeObjectURL(romObjectURL);
      romObjectURL = URL.createObjectURL(file);
      romName = file.name;
      fileName.textContent = file.name;
      launchBtn.style.display = 'block';
    }

    launchBtn.addEventListener('click', launchEmulator);

    function launchEmulator() {
      if (!romObjectURL) return;

      uploadScr.style.display = 'none';
      emuScr.style.display = 'block';

      // EmulatorJS config — must be set before loader.js runs
      window.EJS_player      = '#game';
      window.EJS_core        = 'gba';
      window.EJS_gameUrl     = romObjectURL;
      window.EJS_gameName    = romName.replace(/\.[^.]+$/, '');
      window.EJS_pathtodata  = 'https://cdn.emulatorjs.org/stable/data/';
      window.EJS_startOnLoaded = true;
      window.EJS_color       = '#4a6fff';

      // Touch controls on by default for mobile
      window.EJS_mobileControls = true;

      const script = document.createElement('script');
      script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
      document.body.appendChild(script);
    }

    backBtn.addEventListener('click', () => {
      // Reload to cleanly reset the emulator
      location.reload();
    });
  </script>
</body>
</html>
