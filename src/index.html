<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Brick Breaker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      touch-action: none;
      overflow: hidden;
    }
    h1 {
      font-size: clamp(1rem, 5vw, 2rem);
      margin-bottom: 8px;
      color: #00ffe7;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ffe7;
    }
    #hud {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
      font-size: clamp(0.7rem, 3vw, 1rem);
      color: #aaa;
    }
    #hud span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #00ffe7;
      box-shadow: 0 0 20px #00ffe7aa;
      background: #050510;
      max-width: 100vw;
      touch-action: none;
    }
    #message {
      margin-top: 10px;
      font-size: clamp(0.7rem, 3vw, 1rem);
      color: #00ffe7;
      height: 20px;
      letter-spacing: 2px;
      text-align: center;
    }
    #restartBtn {
      display: none;
      margin-top: 12px;
      padding: 12px 32px;
      background: transparent;
      border: 2px solid #00ffe7;
      color: #00ffe7;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.8rem, 3vw, 1rem);
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00ffe7;
      box-shadow: 0 0 10px #00ffe755;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #restartBtn:hover, #restartBtn:active { background: #00ffe722; }

    /* Mobile touch buttons */
    #touchControls {
      display: none;
      gap: 16px;
      margin-top: 14px;
    }
    .touchBtn {
      width: 70px;
      height: 70px;
      border: 2px solid #00ffe7;
      background: #00ffe711;
      color: #00ffe7;
      font-size: 1.8rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px #00ffe744;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .touchBtn:active { background: #00ffe733; }

    @media (max-width: 520px) or (pointer: coarse) {
      #touchControls { display: flex; }
    }
  </style>
</head>
<body>
  <h1>BRICK BREAKER</h1>
  <div id="hud">
    SCORE: <span id="scoreVal">0</span>
    &nbsp;|&nbsp;
    LIVES: <span id="livesVal">3</span>
    &nbsp;|&nbsp;
    LEVEL: <span id="levelVal">1</span>
  </div>
  <canvas id="c"></canvas>
  <div id="message">TAP CANVAS OR PRESS SPACE TO LAUNCH</div>
  <button id="restartBtn" onclick="init()">PLAY AGAIN</button>

  <div id="touchControls">
    <div class="touchBtn" id="btnLeft">◀</div>
    <div class="touchBtn" id="btnLaunch">🚀</div>
    <div class="touchBtn" id="btnRight">▶</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Responsive sizing
    function getSize() {
      const maxW = Math.min(window.innerWidth - 8, 480);
      const maxH = Math.min(window.innerHeight - 200, 520);
      const size = Math.min(maxW, maxH * (480/520));
      return { W: Math.floor(size), H: Math.floor(size * 520/480) };
    }

    let { W, H } = getSize();
    canvas.width = W;
    canvas.height = H;

    const scale = () => W / 480;

    const PADDLE_W = () => 80 * scale();
    const PADDLE_H = () => 12 * scale();
    const PADDLE_Y = () => H - 40 * scale();
    const BALL_R = () => 8 * scale();
    const BRICK_COLS = 10, BRICK_ROWS = 5;
    const BRICK_W = () => W / BRICK_COLS;
    const BRICK_H = () => 22 * scale();
    const BRICK_PAD = () => 3 * scale();
    const BRICK_TOP = () => 50 * scale();

    const COLORS = ['#ff4d6d','#ff9a00','#ffe600','#a8ff3e','#00ffe7','#7b61ff'];

    let paddle, ball, bricks, score, lives, level, launched, animId, gameOver, won;

    function init() {
      ({ W, H } = getSize());
      canvas.width = W;
      canvas.height = H;

      paddle = { x: W/2 - PADDLE_W()/2, y: PADDLE_Y(), w: PADDLE_W() };
      ball = { x: W/2, y: PADDLE_Y() - BALL_R() - 2, dx: 0, dy: 0, speed: 4 * scale() };
      score = 0; lives = 3; level = 1;
      launched = false; gameOver = false; won = false;
      makeBricks();
      document.getElementById('restartBtn').style.display = 'none';
      document.getElementById('message').textContent = 'TAP CANVAS OR PRESS SPACE TO LAUNCH';
      updateHUD();
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    function makeBricks() {
      bricks = [];
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: c * BRICK_W() + BRICK_PAD()/2,
            y: BRICK_TOP() + r * BRICK_H() + BRICK_PAD()/2,
            w: BRICK_W() - BRICK_PAD(),
            h: BRICK_H() - BRICK_PAD(),
            color: COLORS[r % COLORS.length],
            alive: true
          });
        }
      }
    }

    function launch() {
      if (launched || gameOver || won) return;
      launched = true;
      const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
      ball.dx = Math.cos(angle) * ball.speed;
      ball.dy = Math.sin(angle) * ball.speed;
      document.getElementById('message').textContent = '';
    }

    function updateHUD() {
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('livesVal').textContent = lives;
      document.getElementById('levelVal').textContent = level;
    }

    function loop() {
      update();
      draw();
      if (!gameOver && !won) animId = requestAnimationFrame(loop);
    }

    function update() {
      if (!launched) {
        ball.x = paddle.x + paddle.w / 2;
        return;
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      const br = BALL_R();

      if (ball.x - br < 0) { ball.x = br; ball.dx *= -1; }
      if (ball.x + br > W) { ball.x = W - br; ball.dx *= -1; }
      if (ball.y - br < 0) { ball.y = br; ball.dy *= -1; }

      // Paddle collision
      if (
        ball.dy > 0 &&
        ball.y + br >= paddle.y &&
        ball.y + br <= paddle.y + PADDLE_H() &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w
      ) {
        let hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.dx = hit * ball.speed * 1.2;
        ball.dy = -Math.sqrt(Math.max(ball.speed * ball.speed - ball.dx * ball.dx, 0.1));
        ball.y = paddle.y - br - 1;
      }

      // Fell below
      if (ball.y - br > H) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          endGame(false);
        } else {
          launched = false;
          ball.x = paddle.x + paddle.w/2;
          ball.y = PADDLE_Y() - br - 2;
          ball.dx = 0; ball.dy = 0;
          document.getElementById('message').textContent = 'TAP CANVAS OR PRESS SPACE TO LAUNCH';
        }
        return;
      }

      // Brick collisions
      for (let b of bricks) {
        if (!b.alive) continue;
        if (
          ball.x + br > b.x && ball.x - br < b.x + b.w &&
          ball.y + br > b.y && ball.y - br < b.y + b.h
        ) {
          b.alive = false;
          score += 10 * level;
          updateHUD();
          const overlapL = ball.x + br - b.x;
          const overlapR = b.x + b.w - (ball.x - br);
          const overlapT = ball.y + br - b.y;
          const overlapB = b.y + b.h - (ball.y - br);
          const minH = Math.min(overlapL, overlapR);
          const minV = Math.min(overlapT, overlapB);
          if (minH < minV) ball.dx *= -1;
          else ball.dy *= -1;
          break;
        }
      }

      // Check win
      if (bricks.every(b => !b.alive)) {
        level++;
        if (level > 3) {
          endGame(true);
        } else {
          ball.speed += 0.5 * scale();
          makeBricks();
          launched = false;
          const br2 = BALL_R();
          ball.x = paddle.x + paddle.w/2;
          ball.y = PADDLE_Y() - br2 - 2;
          ball.dx = 0; ball.dy = 0;
          document.getElementById('message').textContent = `LEVEL ${level} — LAUNCH!`;
          updateHUD();
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      for (let b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 6;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.shadowBlur = 0;
      }

      ctx.fillStyle = '#00ffe7';
      ctx.shadowColor = '#00ffe7';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, PADDLE_H(), 6);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R(), 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function endGame(victory) {
      gameOver = !victory;
      won = victory;
      document.getElementById('message').textContent =
        victory ? `🏆 YOU WIN! SCORE: ${score}` : `💀 GAME OVER! SCORE: ${score}`;
      document.getElementById('restartBtn').style.display = 'inline-block';
    }

    // ---- Keyboard ----
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') { e.preventDefault(); launch(); }
    });
    document.addEventListener('keyup', e => keys[e.key] = false);
    setInterval(() => {
      if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 6 * scale());
      if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 6 * scale());
    }, 16);

    // ---- Mouse ----
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = (e.clientX - rect.left) * (W / rect.width) - paddle.w / 2;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    });
    canvas.addEventListener('click', launch);

    // ---- Touch (swipe on canvas) ----
    let lastTouchX = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      lastTouchX = e.touches[0].clientX;
      launch();
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touchX = e.touches[0].clientX;
      paddle.x = (touchX - rect.left) * (W / rect.width) - paddle.w / 2;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
      lastTouchX = touchX;
    }, { passive: false });

    // ---- Touch buttons ----
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnLaunch = document.getElementById('btnLaunch');

    const touchControls = document.getElementById('touchControls');
    if (window.matchMedia('(pointer: coarse)').matches || window.innerWidth <= 520) {
      touchControls.style.display = 'flex';
    }

    let leftHeld = false, rightHeld = false;
    btnLeft.addEventListener('touchstart', e => { e.preventDefault(); leftHeld = true; }, { passive: false });
    btnLeft.addEventListener('touchend', e => { e.preventDefault(); leftHeld = false; }, { passive: false });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); rightHeld = true; }, { passive: false });
    btnRight.addEventListener('touchend', e => { e.preventDefault(); rightHeld = false; }, { passive: false });
    btnLaunch.addEventListener('touchstart', e => { e.preventDefault(); launch(); }, { passive: false });
    btnLaunch.addEventListener('click', launch);

    setInterval(() => {
      if (leftHeld) paddle.x = Math.max(0, paddle.x - 8 * scale());
      if (rightHeld) paddle.x = Math.min(W - paddle.w, paddle.x + 8 * scale());
    }, 16);

    // ---- Resize ----
    window.addEventListener('resize', () => {
      if (!gameOver && !won) init();
    });

    init();
  </script>
</body>
</html>
