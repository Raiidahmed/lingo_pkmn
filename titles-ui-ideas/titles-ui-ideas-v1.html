<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Lingo Dungeon - UI Ideas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --border-size: 3px;
      --panel-padding: 20px;
      --font-main: 'Press Start 2P', cursive;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HUD ── */
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      border-bottom: var(--border-size) solid var(--fg);
      font-size: 0.6rem;
      letter-spacing: 1px;
      z-index: 100;
    }
    #hud .title { font-weight: bold; letter-spacing: 2px; }
    #hud .stats { display: flex; gap: 15px; }

    /* ── Screens Container ── */
    #game-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .screen {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg);
      overflow-y: auto;
      text-align: center;
    }
    .screen.active { display: flex; }

    /* ── Dialogue/Panels (Undertale Style) ── */
    .panel {
      border: var(--border-size) solid var(--fg);
      background: var(--bg);
      padding: 24px;
      width: 100%;
      max-width: 400px;
      position: relative;
      margin-bottom: 20px;
    }

    h1 { font-size: 1.2rem; margin-bottom: 24px; letter-spacing: 4px; }
    h2 { font-size: 0.7rem; color: #aaa; margin-bottom: 20px; text-transform: uppercase; }
    p { font-size: 0.55rem; line-height: 2; margin-bottom: 20px; color: #ddd; }

    /* ── Inputs & Buttons ── */
    input[type="text"] {
      background: var(--bg);
      border: var(--border-size) solid var(--fg);
      color: var(--fg);
      padding: 12px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      width: 100%;
      max-width: 280px;
      margin-bottom: 20px;
      text-align: center;
      outline: none;
    }
    input[type="text"]:focus { background: #111; }

    .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }

    button {
      font-family: var(--font-main);
      cursor: pointer;
      text-transform: uppercase;
      padding: 14px;
      font-size: 0.65rem;
      border: var(--border-size) solid var(--fg);
      transition: all 0.1s;
    }

    .big-btn { background: var(--fg); color: var(--bg); font-weight: bold; }
    .big-btn:hover { background: var(--bg); color: var(--fg); }
    .big-btn:active { transform: scale(0.98); }

    .ghost-btn { background: var(--bg); color: #aaa; border-color: #555; }
    .ghost-btn:hover { color: var(--fg); border-color: var(--fg); }

    /* ── Hall of Fame / Leaderboard ── */
    #lb-list {
      width: 100%;
      max-width: 320px;
      border: 2px solid #444;
      margin-top: 20px;
      font-size: 0.5rem;
    }
    .lb-header { background: #222; padding: 8px; color: #888; }
    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-top: 1px solid #222;
    }

    /* ── Status Screen Specifics ── */
    #level-selector {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      border: var(--border-size) solid var(--fg);
      padding: 12px;
      font-family: var(--font-main);
      font-size: 0.6rem;
      margin-bottom: 20px;
      outline: none;
    }

    #status-wordbank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 10px 0 24px;
    }
    .word-chip {
      border: 1px solid #888;
      padding: 6px 10px;
      font-size: 0.45rem;
      color: #ccc;
    }

    /* ── Audio Gate ── */
    #audio-gate {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #audio-gate.active { display: flex; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: var(--border-size) solid var(--fg);
      padding: 10px 20px;
      font-size: 0.5rem;
      z-index: 150;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 400px) {
      h1 { font-size: 1rem; }
      #hud { font-size: 0.5rem; }
      button { font-size: 0.55rem; }
    }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <span class="title">LINGO DUNGEON</span>
    <div class="stats">
      <span>XP:<span id="xp-val">0</span></span>
      <span>LVL:<span id="lvl-val">1</span></span>
    </div>
  </div>

  <div id="game-wrap">
    <div id="toast">SAVED</div>

    <!-- TITLE SCREEN -->
    <div id="screen-title" class="screen active">
      <h1>LINGO DUNGEON</h1>
      <div class="panel">
        <h2>Enter Thy Name</h2>
        <input type="text" id="name-input" placeholder="PLAYER NAME" maxlength="12" autocomplete="username" spellcheck="false"/>
        <div class="btn-group">
          <button class="big-btn" id="start-btn">Resume Save</button>
          <button class="ghost-btn" id="create-save-btn">New Game</button>
        </div>
      </div>

      <div id="lb-list">
        <div class="lb-header">HALL OF FAME</div>
        <div class="lb-row"><span>1. HERO</span><span>999 XP</span></div>
        <div class="lb-row"><span>2. MAGE</span><span>750 XP</span></div>
        <div class="lb-row"><span>3. ROGUE</span><span>420 XP</span></div>
      </div>
    </div>

    <!-- STATUS SCREEN -->
    <div id="screen-status" class="screen">
      <h1>STATUS</h1>
      <div class="panel">
        <h2>Dungeon Progress</h2>
        <select id="level-selector">
          <option>LEVEL 1: THE ENTRANCE</option>
          <option>LEVEL 2: THE MAZE</option>
          <option disabled>LEVEL 3: LOCKED</option>
        </select>

        <h2>Word Bank</h2>
        <div id="status-wordbank">
          <div class="word-chip">HOLA</div>
          <div class="word-chip">GRACIAS</div>
          <div class="word-chip">PERRO</div>
          <div class="word-chip">GATO</div>
        </div>

        <div class="btn-group">
          <button class="big-btn" id="status-start-btn">Enter Dungeon</button>
          <button class="ghost-btn" id="status-logout-btn">Log Out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- AUDIO GATE -->
  <div id="audio-gate" class="active">
    <div class="panel">
      <h1>SOUND?</h1>
      <p>This dungeon is better with its haunting melodies.</p>
      <div class="btn-group">
        <button class="big-btn" id="audio-enable-btn">Enable Sound</button>
        <button class="ghost-btn" id="audio-mute-btn">Play Muted</button>
      </div>
    </div>
  </div>

  <script>
    const screenTitle = document.getElementById('screen-title');
    const screenStatus = document.getElementById('screen-status');
    const audioGate = document.getElementById('audio-gate');
    const toast = document.getElementById('toast');

    // Simple Audio Gate Logic
    document.getElementById('audio-enable-btn').onclick = () => audioGate.classList.remove('active');
    document.getElementById('audio-mute-btn').onclick = () => audioGate.classList.remove('active');

    // Navigation Logic
    document.getElementById('start-btn').onclick = () => {
      showScreen('status');
      showToast('WELCOME BACK');
    };

    document.getElementById('create-save-btn').onclick = () => {
      showScreen('status');
      showToast('NEW SAVE CREATED');
    };

    document.getElementById('status-logout-btn').onclick = () => {
      showScreen('title');
    };

    document.getElementById('status-start-btn').onclick = () => {
      showToast('ENTERING DUNGEON...');
    };

    function showScreen(id) {
      screenTitle.classList.remove('active');
      screenStatus.classList.remove('active');
      if (id === 'title') screenTitle.classList.add('active');
      if (id === 'status') screenStatus.classList.add('active');
    }

    function showToast(msg) {
      toast.innerText = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2000);
    }
  </script>
</body>
</html>
